# NanoClaw Webhook Nginx 反向代理
# 将飞书 webhook 请求从公网转发到本地 8080 端口
#
# 安装:
#   cp nginx-webhook.conf /etc/nginx/sites-available/nanoclaw-webhook
#   ln -s /etc/nginx/sites-available/nanoclaw-webhook /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name 163.7.5.173;

    location /feishu/webhook {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
